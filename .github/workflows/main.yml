name: AI Quant Bot Auto Run

on:
  schedule:
    # 매일 아침 8시 실행 (한국 시간 기준. 서버 시간인 UTC 기준으로는 전날 밤 11시입니다)
    - cron: '0 23 * * *'
  workflow_dispatch: # 내가 원할 때 수동으로 버튼을 눌러서 실행할 수 있게 해주는 마법의 주문!

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 내 코드 가져오기
      uses: actions/checkout@v3

    - name: 2. 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 필요한 인공지능 라이브러리 설치
      run: |
        pip install yfinance numpy pandas scikit-learn tensorflow transformers requests torch

    - name: 4. 내 퀀트 봇 실행하기!
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      run: python quant_bot.py
